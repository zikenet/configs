# --------------------------------------------------------------------------
# Status line customisation
# --------------------------------------------------------------------------
set -g mode-style "fg=#93a1a1,bg=#383A3E"

set -g message-style "fg=#93a1a1,bg=default"
set -g message-command-style "fg=#93a1a1,bg=default"

set -g pane-border-style "fg=#93a1a1"
set -g pane-active-border-style "fg=#93a1a1"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#738484,bg=default"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#93a1a1,bg=default]#[bg=#93a1a1,fg=#383A3E, bold] [#(echo #{session_name} | tr '[:lower:]' '[:upper:]')] #[fg=#93a1a1,bg=default]"
set -g status-right "#[fg=#738484,bg=default]#[fg=#839393,bg=#738484]#[fg=#93a1a1,bg=#839393]#[fg=#21252b,bg=#93a1a1,bold] #h #[fg=#93a1a1,bg=default]"

setw -g window-status-activity-style "underscore,fg=#15161E,bg=#75888a"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#75888a"
setw -g window-status-format '#[default] #I / #{b:pane_current_path}#{?window_zoomed_flag, ⛶} '
setw -g window-status-current-format '#[fg=#93a1a1,bg=default]#[fg=#15161E,bg=#93a1a1] #I #[fg=#93a1a1,bg=#383A3E] #{b:pane_current_path}#{?window_zoomed_flag, ⛶} #[fg=#383A3E,bg=default,nobold]'
